# =============================================================================
# vnux-server-template — docker-compose.yml
# Stack de produção para hospedagem de site estático / SPA
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy e servidor de arquivos estáticos
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: vnux-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Configuração principal do Nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # Configs modulares incluídas pelo nginx.conf
      - ./nginx/security.conf:/etc/nginx/security.conf:ro
      - ./nginx/gzip.conf:/etc/nginx/gzip.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./nginx/cloudflare-realip.conf:/etc/nginx/cloudflare-realip.conf:ro
      - ./nginx/cache.conf:/etc/nginx/cache.conf:ro

      # Virtual hosts (sites)
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

      # Arquivos do site
      - ./site:/var/www/html:ro

      # Certificados SSL (Origin Certificate da Cloudflare)
      - ./certs:/etc/nginx/certs:ro

      # Logs persistentes no host
      - ./logs/nginx:/var/log/nginx

    environment:
      TZ: ${TIMEZONE:-America/Sao_Paulo}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - vnux-net

    labels:
      com.vnux.service: "nginx"
      com.vnux.description: "Servidor web principal"
      com.vnux.version: "1.27-alpine"

# =============================================================================
# Redes
# =============================================================================
networks:
  vnux-net:
    driver: bridge
    name: vnux-net
