# =============================================================================
# vnux-server-template — docker-compose.yml
# Stack com Nginx Proxy Manager (NPM)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx Proxy Manager — Interface visual e proxy reverso
  # ---------------------------------------------------------------------------
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: vnux-npm
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      # Arquivos do banco de dados e configs do NPM
      - ./data:/data
      # Certificados Let's Encrypt / Customizados
      - ./letsencrypt:/etc/letsencrypt
      # Diretório para sites estáticos locais, se necessário
      - ./site:/var/www/html
    environment:
      # DB_SQLITE_FILE: "/data/database.sqlite" (Padrão do NPM)
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    networks:
      - vnux-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Redes
# =============================================================================
networks:
  vnux-net:
    driver: bridge
    name: vnux-net
