# =============================================================================
# vnux-server-template — nginx/nginx.conf
# Configuração principal do Nginx (modular)
# =============================================================================

user  nginx;

# Número de worker processes: auto detecta os CPUs disponíveis
worker_processes auto;

# PID do processo principal
pid /var/run/nginx.pid;

# Número máximo de arquivos abertos por worker
worker_rlimit_nofile 65535;

# Módulos dinamicamente carregados (Alpine Nginx)
# load_module modules/ngx_http_brotli_filter_module.so;

error_log /var/log/nginx/error.log warn;

# =============================================================================
# Events
# =============================================================================
events {
    # Número máximo de conexões simultâneas por worker
    worker_connections 4096;

    # Aceitar múltiplas conexões de uma vez
    multi_accept on;

    # Método de multiplexação mais eficiente (Linux)
    use epoll;
}

# =============================================================================
# HTTP
# =============================================================================
http {

    # ─── MIME Types ──────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Charset ─────────────────────────────────────────────────────────────
    charset utf-8;

    # ─── Segurança base ──────────────────────────────────────────────────────
    server_tokens off;

    # ─── Performance ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;

    # ─── Tamanho do corpo da requisição ─────────────────────────────────────
    client_max_body_size        100M;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                30s;

    # ─── Hash tables ─────────────────────────────────────────────────────────
    types_hash_max_size      2048;
    types_hash_bucket_size   64;
    server_names_hash_bucket_size 128;

    # ─── Buffers de proxy ────────────────────────────────────────────────────
    proxy_buffering     on;
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;

    # ─── Formato de log ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'cf_ray=$http_cf_ray '
                    'cf_ip=$http_cf_connecting_ip';

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"cf_ip":"$http_cf_connecting_ip",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"cf_ray":"$http_cf_ray",'
            '"cf_country":"$http_cf_ipcountry"'
        '}';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Rate Limiting Global ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── Mapa de detecção de bots ────────────────────────────────────────────
    map $http_user_agent $is_bot {
        default                         0;
        ~*(bot|crawl|spider|scan)       1;
        ~*nmap                          1;
        ~*nikto                         1;
        ~*sqlmap                        1;
    }

    # ─── Módulos incluídos ───────────────────────────────────────────────────
    include /etc/nginx/gzip.conf;
    include /etc/nginx/cloudflare-realip.conf;

    # ─── Virtual Hosts ───────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
