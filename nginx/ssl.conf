# =============================================================================
# vnux-server-template — nginx/ssl.conf
# Configuração TLS/SSL de alta segurança
# Otimizado para Cloudflare Origin Certificate (Full Strict)
# Incluído dentro dos blocos server HTTPS
# =============================================================================

# ─── Protocolos TLS ───────────────────────────────────────────────────────────
# Apenas TLSv1.2 e TLSv1.3 (TLS 1.0 e 1.1 são obsoletos e inseguros)
ssl_protocols TLSv1.2 TLSv1.3;

# ─── Cipher Suites ───────────────────────────────────────────────────────────
# Conjunto de cifras moderno e seguro
# Preferência do servidor sobre o cliente (para controlar a seleção)
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

# ─── Session Cache ────────────────────────────────────────────────────────────
# Cache de sessão SSL compartilhado entre workers (melhora performance)
# 1MB ≈ 4000 sessões
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ─── OCSP Stapling ───────────────────────────────────────────────────────────
# Cloudflare Origin Certificates não suportam OCSP Stapling diretamente.
# Desabilitado para compatibilidade.
# ssl_stapling on;
# ssl_stapling_verify on;

# ─── Diffie-Hellman ──────────────────────────────────────────────────────────
# Parâmetros DH para cifras DHE (maior segurança)
# Para gerar: openssl dhparam -out /etc/nginx/dhparam.pem 2048
# ssl_dhparam /etc/nginx/dhparam.pem;

# ─── Curva Elíptica ──────────────────────────────────────────────────────────
ssl_ecdh_curve X25519:secp384r1;

# ─── Buffer SSL ──────────────────────────────────────────────────────────────
# Otimização de buffer para TLS
ssl_buffer_size 4k;

# ─── Early Data (TLS 1.3 0-RTT) ──────────────────────────────────────────────
# DESABILITADO: 0-RTT pode ser vulnerável a ataques de replay
# ssl_early_data on;
