# =============================================================================
# vnux-server-template — nginx/security.conf
# Headers de segurança HTTP e bloqueios
# Incluído pelo virtual host (dentro do bloco server)
# =============================================================================

# ─── Ocultar versão do Nginx ──────────────────────────────────────────────────
# (server_tokens off está no nginx.conf, reforçamos aqui para o vhost)
more_clear_headers Server;

# ─── X-Frame-Options ─────────────────────────────────────────────────────────
# Impede que o site seja carregado em iframes externos (clickjacking)
add_header X-Frame-Options "SAMEORIGIN" always;

# ─── X-Content-Type-Options ──────────────────────────────────────────────────
# Impede que o browser faça MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# ─── X-XSS-Protection ────────────────────────────────────────────────────────
# Proteção XSS em browsers legados
add_header X-XSS-Protection "1; mode=block" always;

# ─── Referrer-Policy ─────────────────────────────────────────────────────────
# Controla quais informações de referência são enviadas
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Permissions-Policy ──────────────────────────────────────────────────────
# Desabilita APIs de browser não utilizadas pelo site
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# ─── Content-Security-Policy ─────────────────────────────────────────────────
# Política de segurança de conteúdo (ajuste conforme os recursos do seu site)
# - default-src 'self' → permite apenas recursos do próprio domínio
# - script-src → permite scripts do domínio + inline (para React)
# - style-src  → permite estilos do domínio + inline (para CSS-in-JS)
# - img-src    → permite imagens do domínio + data URIs
# - font-src   → permite fontes do domínio + Google Fonts
# - connect-src → permite fetch/XHR para o próprio domínio
# - frame-ancestors → bloqueia embedding em outros sites
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

# ─── HSTS (HTTP Strict Transport Security) ───────────────────────────────────
# ATENÇÃO: Descomente SOMENTE após validar que HTTPS está funcionando
# corretamente. Uma vez ativo com includeSubDomains, TODOS os subdomínios
# precisarão servir HTTPS. max-age=31536000 = 1 ano.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ─── Bloquear métodos HTTP desnecessários ────────────────────────────────────
# Permite apenas GET, HEAD e POST (necessários para um site estático/SPA)
# Retorna 405 para TRACE, DELETE, PATCH, PUT, OPTIONS
if ($request_method !~ ^(GET|HEAD|POST)$) {
    return 405;
}

# ─── Bloquear user-agents maliciosos ─────────────────────────────────────────
# Bloqueia scanners e bots conhecidamente maliciosos
if ($http_user_agent ~* (nmap|nikto|wikto|sf|sqlmap|bsqlbf|w3af|acunetix|havij|appscan)) {
    return 403;
}

# ─── Bloquear acesso a arquivos ocultos ──────────────────────────────────────
# Ex: .htaccess, .git, .env, etc.
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# ─── Bloquear acesso a arquivos de configuração ──────────────────────────────
location ~* \.(env|log|bak|sql|sh|conf|yaml|yml|toml|json)$ {
    # Exceção para manifest.json e outros JSONs legítimos do site
    # Esta regra é sobrescrita pelo vhost quando necessário
    deny all;
    return 404;
}
