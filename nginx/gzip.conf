# =============================================================================
# vnux-server-template — nginx/gzip.conf
# Compressão Gzip para redução de tráfego e melhor performance
# Incluído no bloco http do nginx.conf
# =============================================================================

# Habilitar compressão Gzip
gzip on;

# Comprimir respostas de proxies upstream também
gzip_proxied any;

# Nível de compressão: 1 (mais rápido) a 9 (mais comprimido)
# 6 é o ponto ideal entre CPU e tamanho
gzip_comp_level 6;

# Tamanho mínimo da resposta para aplicar compressão (1KB)
# Respostas menores não valem o overhead de CPU
gzip_min_length 1024;

# Número e tamanho dos buffers para compressão
gzip_buffers 16 8k;

# Versão mínima do HTTP para compressão
gzip_http_version 1.1;

# Adicionar header Vary para CDNs e proxies (importante para Cloudflare)
gzip_vary on;

# Desabilitar compressão para IE6 (browser legado com bug de Gzip)
gzip_disable "msie6";

# ─── Tipos MIME a comprimir ───────────────────────────────────────────────────
# Inclui todos os tipos comuns de texto, dados e assets de frontend
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/cache-manifest
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy
    application/atom+xml
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    font/ttf
    font/eot
    font/otf
    image/bmp
    image/svg+xml
    image/vnd.microsoft.icon
    image/x-icon;
    # Nota: image/png, image/jpeg, image/webp, image/avif e
    # application/pdf já são comprimidos nativamente — não incluídos.
