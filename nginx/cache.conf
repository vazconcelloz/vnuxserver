# =============================================================================
# vnux-server-template — nginx/cache.conf
# Regras de cache HTTP para assets estáticos
# Incluído dentro dos blocos server nos virtual hosts
# =============================================================================

# ─── Assets com hash no nome (React/Vite com content hashing) ─────────────────
# Ex: main.a1b2c3d4.js, styles.e5f6a7b8.css, chunk-vendor.12345678.js
# Cache máximo: 1 ano (imutável, pois o hash muda a cada build)
location ~* \.(js|css|mjs)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Vary "Accept-Encoding";
    access_log off;
    log_not_found off;
}

# ─── Fontes e ícones (raramente mudam) ───────────────────────────────────────
location ~* \.(woff|woff2|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
    log_not_found off;
}

# ─── Imagens ─────────────────────────────────────────────────────────────────
location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|bmp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Vary "Accept-Encoding";
    access_log off;
    log_not_found off;
}

# ─── Vídeos e Áudios ─────────────────────────────────────────────────────────
location ~* \.(mp4|webm|ogg|mp3|wav|flac)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

# ─── Documentos ──────────────────────────────────────────────────────────────
location ~* \.(pdf|doc|docx|xls|xlsx|zip)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

# ─── Manifest e Service Worker (não cacheado) ────────────────────────────────
location ~* (manifest\.json|service-worker\.js|sw\.js)$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    access_log off;
}

# ─── robots.txt e sitemap ────────────────────────────────────────────────────
location = /robots.txt {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    access_log off;
    log_not_found off;
}

location = /sitemap.xml {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    access_log off;
    log_not_found off;
}
