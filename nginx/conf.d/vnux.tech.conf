# =============================================================================
# vnux-server-template — nginx/conf.d/vnux.tech.conf
# Virtual host principal para vnux.tech
# Otimizado para: React/Vite SPA, Cloudflare Full Strict, HTTP/2
# =============================================================================



# =============================================================================
# BLOCO 1: HTTP (porta 80)
# Redireciona todo o tráfego HTTP para HTTPS
# Quando usando Cloudflare Proxy, este bloco cuida da comunicação
# Cloudflare → Servidor (Cloudflare faz o HTTPS para o visitante)
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name vnux.tech www.vnux.tech;

    # ─── Health check (sem redirect, para monitoramento) ──────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # ─── Redirecionar tudo para HTTPS ─────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# BLOCO 2: HTTPS (porta 443) — Servidor principal
# HTTP/2 habilitado, SSL com Cloudflare Origin Certificate
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    # HTTP/2 habilitado
    http2 on;

    server_name vnux.tech www.vnux.tech;

    # ─── Raiz do site ─────────────────────────────────────────────────────
    root /var/www/html;
    index index.html;

    # ─── SSL: Cloudflare Origin Certificate ───────────────────────────────
    ssl_certificate     /etc/nginx/certs/vnux.tech.crt;
    ssl_certificate_key /etc/nginx/certs/vnux.tech.key;

    # ─── Configuração SSL modular ──────────────────────────────────────────
    include /etc/nginx/ssl.conf;

    # ─── Logs separados por virtual host ──────────────────────────────────
    access_log /var/log/nginx/vnux.tech-access.log main;
    error_log  /var/log/nginx/vnux.tech-error.log warn;

    # ─── Rate limiting ────────────────────────────────────────────────────
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 50;
    limit_req_status 429;
    limit_conn_status 429;

    # ─── Tamanho máximo do corpo ──────────────────────────────────────────
    client_max_body_size 100M;

    # ─── Headers de segurança ─────────────────────────────────────────────
    server_tokens off;

    # X-Frame-Options: impede clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options: impede MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection: proteção básica em browsers legados
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer-Policy: controla header Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy: desabilita APIs não utilizadas
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content-Security-Policy
    # Ajuste conforme as necessidades do seu site (CDNs, APIs externas, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # HSTS — Descomente após confirmar que HTTPS funciona corretamente
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Bloquear métodos HTTP desnecessários ────────────────────────────
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 405;
    }

    # ─── Bloquear bots maliciosos ─────────────────────────────────────────
    if ($is_bot) {
        return 403;
    }

    # ─── Health check ─────────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # ─── Bloquear acesso a arquivos ocultos ──────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ─── Bloquear arquivos sensíveis ──────────────────────────────────────
    location ~* \.(env|log|bak|sql|sh|conf|yaml|yml|toml)$ {
        deny all;
        return 404;
    }

    # ─── Regras de cache (assets estáticos) ──────────────────────────────
    include /etc/nginx/cache.conf;

    # ─── SPA Fallback (React Router, Vue Router, etc.) ───────────────────
    # Retorna index.html para qualquer rota não encontrada no disco
    # Isso permite que o roteamento do frontend funcione corretamente
    location / {
        try_files $uri $uri/ /index.html;

        # Não cachear o index.html (sempre buscar versão mais recente)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # ─── Assets do Vite com hash (imutáveis) ─────────────────────────────
    # O Vite gera arquivos com hash: main.abc12345.js
    # Servidos diretamente sem fallback para index.html
    location /assets/ {
        try_files $uri =404;

        # Cache longo: o hash garante que a URL muda a cada build
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ─── Favicon ─────────────────────────────────────────────────────────
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        log_not_found off;
    }

    # ─── robots.txt ───────────────────────────────────────────────────────
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        log_not_found off;
    }
}
