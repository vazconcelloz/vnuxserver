    # Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬ Regras de cache (assets estÃƒÂ¡ticos) Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬Ã¢â€â‚¬
    include /etc/nginx/cache.conf;

    # â”€â”€â”€ SPA Fallback (EstÃ¡tico) OU Proxy Reverso (Node.js/SSR) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location / {
        # OPÃ‡ÃƒO 1: Para site estÃ¡tico (React/Vite sem SSR)
        # try_files $uri $uri/ /index.html;
        
        # NÃ£o cachear o index.html (sempre buscar versÃ£o mais recente)
        # add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        # add_header Pragma "no-cache" always;
        # expires -1;

        # =====================================================================
        # OPÃ‡ÃƒO 2: Para Proxy Reverso (TanStack Start, Next.js, Node)
        # IMPORTANTE: Se o seu app Node estÃ¡ rodando direto no Ubuntu na porta 3000,
        # vocÃª deve usar o IP da interface docker (ex: 172.17.0.1) ou host.docker.internal.
        # =====================================================================
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
