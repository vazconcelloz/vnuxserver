# =============================================================================
# vnux-server-template — nginx/conf.d/redirects.conf
# Regras de redirecionamento global
#
# Exemplos de uso:
# - Redirecionar www → apex (ou apex → www)
# - Redirecionar URLs antigas para novas
# - Redirecionar subdomínios legados
# =============================================================================

# =============================================================================
# Servidor catch-all: rejeita requisições com Host inválido
# Impede que o servidor responda a IPs diretos ou domínios não configurados
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    # Certificado dummy para o catch-all (usa o mesmo do site principal)
    # O Nginx exige um certificado mesmo no server de fallback
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    server_name _;

    # Retorna 444 (fecha a conexão sem resposta HTTP)
    return 444;
}

# =============================================================================
# Redirecionamento www → apex
# Garante que www.vnux.tech redirecione para vnux.tech
# NOTA: Se preferir apex → www, inverta as regras
# Este bloco é opcional se o virtual host principal já inclui ambos
# os server_names. Mantenha aqui para clareza explícita.
