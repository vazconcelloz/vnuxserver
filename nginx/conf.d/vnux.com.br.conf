# =============================================================================
# vnux-server-template â€” nginx/conf.d/vnux.com.br.conf
# Virtual host principal para vnux.com.br
# Otimizado para: React/Vite SPA, Cloudflare Full Strict, HTTP/2
# =============================================================================

# =============================================================================
# BLOCO 1: HTTP (porta 80)
# Redireciona todo o trÃ¡fego HTTP para HTTPS
# Quando usando Cloudflare Proxy, este bloco cuida da comunicaÃ§Ã£o
# Cloudflare â†’ Servidor (Cloudflare faz o HTTPS para o visitante)
# =============================================================================
server {
    listen 80;
    listen [::]:80;

    server_name vnux.com.br www.vnux.com.br;

    # â”€â”€â”€ Health check (sem redirect, para monitoramento) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # â”€â”€â”€ Redirecionar tudo para HTTPS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# BLOCO 2: HTTPS (porta 443) â€” Servidor principal
# HTTP/2 habilitado, SSL com Cloudflare Origin Certificate
# =============================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    # HTTP/2 habilitado
    http2 on;

    server_name vnux.com.br www.vnux.com.br;

    # â”€â”€â”€ Raiz do site â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    root /var/www/html;
    index index.html;

    # â”€â”€â”€ SSL: Cloudflare Origin Certificate â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    ssl_certificate     /etc/nginx/certs/vnux.com.br.crt;
    ssl_certificate_key /etc/nginx/certs/vnux.com.br.key;

    # â”€â”€â”€ ConfiguraÃ§Ã£o SSL modular â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    include /etc/nginx/ssl.conf;

    # â”€â”€â”€ Logs separados por virtual host â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    access_log /var/log/nginx/vnux.com.br-access.log main;
    error_log  /var/log/nginx/vnux.com.br-error.log warn;

    # â”€â”€â”€ Rate limiting â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 50;
    limit_req_status 429;
    limit_conn_status 429;

    # â”€â”€â”€ Tamanho mÃ¡ximo do corpo â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    client_max_body_size 100M;

    # â”€â”€â”€ Headers de seguranÃ§a â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    server_tokens off;

    # X-Frame-Options: impede clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options: impede MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection: proteÃ§Ã£o bÃ¡sica em browsers legados
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer-Policy: controla header Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy: desabilita APIs nÃ£o utilizadas
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content-Security-Policy
    # Ajuste conforme as necessidades do seu site (CDNs, APIs externas, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # HSTS â€” Descomente apÃ³s confirmar que HTTPS funciona corretamente
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # â”€â”€â”€ Bloquear mÃ©todos HTTP desnecessÃ¡rios â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 405;
    }

    # â”€â”€â”€ Bloquear bots maliciosos â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if ($is_bot) {
        return 403;
    }

    # â”€â”€â”€ Health check â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # â”€â”€â”€ Bloquear acesso a arquivos ocultos â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # â”€â”€â”€ Bloquear arquivos sensÃ­veis â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location ~* \.(env|log|bak|sql|sh|conf|yaml|yml|toml)$ {
        deny all;
        return 404;
    }

    # â”€â”€â”€ Regras de cache (assets estÃ¡ticos) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    include /etc/nginx/cache.conf;

    # ─── SPA Fallback (Estático) OU Proxy Reverso (Node.js/SSR) ──────────────
    location / {
        # OPÇÃO 1: Para site estático (React/Vite sem SSR)
        try_files $uri $uri/ /index.html;
        
        # Não cachear o index.html (sempre buscar versão mais recente)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;

        # =====================================================================
        # OPÇÃO 2: Para Proxy Reverso (TanStack Start, Next.js, Node)
        # Comente as 4 linhas da OPÇÃO 1 acima e descomente as linhas abaixo.
        # IMPORTANTE: Se o seu app Node está rodando direto no Ubuntu na porta 3000,
        # você deve usar o IP da interface docker (ex: 172.17.0.1) ou host.docker.internal.
        # Se estiver rodando em outro container Docker na mesma rede, use o nome do container.
        # =====================================================================
        # proxy_pass http://172.17.0.1:3000;
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection 'upgrade';
        # proxy_set_header Host $host;
        # proxy_cache_bypass $http_upgrade;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    }

    # â”€â”€â”€ Assets do Vite com hash (imutÃ¡veis) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # O Vite gera arquivos com hash: main.abc12345.js
    # Servidos diretamente sem fallback para index.html
    location /assets/ {
        try_files $uri =404;

        # Cache longo: o hash garante que a URL muda a cada build
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # â”€â”€â”€ Favicon â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        log_not_found off;
    }

    # â”€â”€â”€ robots.txt â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        log_not_found off;
    }
}
